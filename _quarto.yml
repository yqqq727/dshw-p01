project:
  type: book

book:
  title: "P01: 金融数据获取、管理与初步分析"
  author: "量化金融分析项目"
  date: "2026-04-08"
  chapters:
    - index.qmd
    - part: "第一部分：数据获取与清洗"
      chapters:
        - 01_download.ipynb
        - 02_clean.ipynb
