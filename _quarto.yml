project:
  type: book

book:
  title: "P01: 金融数据获取、管理与初步分析"
  author: "量化金融分析项目"
  date: "2026-04-08"
  chapters:
    - index.qmd
    - part: "数据获取与清洗"
      chapters:
        - 01_download.ipynb
        - 02_clean.ipynb
    - part: "统计分析与可视化"
      chapters:
        - 03_analysis.ipynb
    - part: "投资策略建议"
      chapters:
        - 04_investment_recommendations.ipynb
    - part: "附录"
      chapters:
        - executive_summary.md

  sidebar:
    style: docked
    search: true
    collapse_level: 2
    contents:
      - section: "项目概述"
        contents:
          - index.qmd
      - section: "数据获取与清洗"
        contents:
          - href: 01_download.ipynb
            title: "数据下载"
          - href: 02_clean.ipynb
            title: "数据清洗与管理"
      - section: "统计分析与可视化"
        contents:
          - href: 03_analysis.ipynb
            title: "统计分析与可视化"
      - section: "投资策略建议"
        contents:
          - href: 04_investment_recommendations.ipynb
            title: "投资策略与实操指南"
      - section: "附录"
        contents:
          - href: executive_summary.md
            title: "执行摘要与投资建议"

format:
  html:
    theme:
      light: flatly
      dark: darkly
    toc: true
    toc-depth: 3
    number-sections: true
    code-fold: true
    code-tools: true
    code-copy: true
    highlight-style: github
    css: styles.css

execute:
  freeze: auto  # 渲染时自动执行
  cache: true
  warning: false
  message: false

bibliography: references.bib
